<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BCS - Business Checkup System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INÍCIO -->
<div class="container" id="inicio">
  <h1>BCS</h1>
  <h2>Business Checkup System</h2>
  <p class="frase">Descubra falhas ocultas no seu negócio e aumente sua eficiência</p>
  <button onclick="iniciar()">Iniciar diagnóstico</button>
</div>

<!-- QUESTIONÁRIO -->
<div class="container" id="questionario" style="display:none;">
  <div class="progresso">
    <div id="barra"></div>
  </div>

  <h2 id="pergunta"></h2>

  <div class="botoes">
    <button onclick="responder(2)">Sim</button>
    <button onclick="responder(1)">Parcialmente</button>
    <button onclick="responder(0)">Não</button>
  </div>
</div>

<!-- RESULTADO -->
<div class="container dashboard" id="resultado" style="display:none;">

  <h1 id="porcentagem"></h1>
  <h2 id="tituloResultado"></h2>
  <p id="descricaoResultado"></p>

  <div class="grid">

    <div class="bloco">
      <h3>Recomendações</h3>
      <ul id="recomendacoes"></ul>
    </div>

    <div class="bloco">
      <h3>Plano de ação</h3>
      <ul id="planoAcao"></ul>
    </div>

    <div class="bloco grafico">
      <canvas id="grafico"></canvas>
    </div>

    <div class="bloco">
      <h3>Resumo estratégico</h3>
      <p id="resumo"></p>
    </div>

  </div>

  <button onclick="reiniciar()">Refazer diagnóstico</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
